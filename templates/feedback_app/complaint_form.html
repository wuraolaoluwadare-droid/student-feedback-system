{% extends 'base.html' %}

{% block title %}Anonymous Complaint{% endblock %}

{% block content %}

<div class="card shadow p-4">

    <h2 class="text-center text-danger mb-4">
        Anonymous Complaint
    </h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Complaint Category
            </label>

            <select
                class="form-select"
                name="category"
                required>

                <option value="">Select Category</option>

                <option value="Lecturer Misconduct">
                    Lecturer Misconduct
                </option>

                <option value="Harassment">
                    Harassment
                </option>

                <option value="Poor Facilities">
                    Poor Facilities
                </option>

                <option value="Examination Issues">
                    Examination Issues
                </option>

                <option value="Other">
                    Other
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Complaint
            </label>

            <textarea
                class="form-control"
                rows="6"
                name="message"
                required></textarea>

        </div>

        <button
            class="btn btn-danger w-100">

            Submit Complaint

        </button>

    </form>

</div>

{% endblock %}
